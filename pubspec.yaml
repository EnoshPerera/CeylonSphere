name: ceylon_sphere
description: A Flutter project for CeylonSphere

publish_to: 'none' # Remove this line if you want to publish your app to pub.dev

environment:
  sdk: ">=3.7.0 <4.0.0"  # Dart SDK version range

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  image_picker: ^0.8.5+3  # Changed to the specified version
  cached_network_image: ^3.3.0
  # firebase_auth: ^4.5.0
    
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/profile_picture.png

